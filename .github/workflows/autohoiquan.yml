name: Auto HoiQuan

on:
  schedule:
    - cron: '0,15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài đặt bộ 3 phiên bản vàng để tránh lỗi SSL/AttributeError
          pip install cryptography==38.0.4
          pip install pyOpenSSL==22.0.0
          pip install selenium-wire webdriver-manager PyGithub selenium
          
      - name: Run Bot
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TZ: Asia/Ho_Chi_Minh
        run: python bottestlink.py
